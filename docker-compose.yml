version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safeguard-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # SQLite persistence
      - ./snapshots:/app/snapshots # Violation snapshots
      - ./yolov8n.pt:/app/yolov8n.pt
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DB_URL: sqlite:///./data/safety.db
      SNAPSHOT_DIR: snapshots
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      MODEL_PATH: yolov8n.pt
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_RECIPIENTS: ${ALERT_RECIPIENTS:-}
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: safeguard-frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: safeguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
